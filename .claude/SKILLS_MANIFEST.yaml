# ============================================================
# LOAD DISCIPLINE
# ============================================================
load_rules:
  always_loaded:
    - "This manifest (metadata only)"

  load_on_command:
    - "L1 (Quick Reference) when skill triggered"
    - "L2 (Core Procedure) when executing"
    - "L3 (Advanced Patterns) when complexity detected"
    - "L4 (Output Templates) when generating deliverables"

  unload_after:
    - "Phase completion"
    - "Context usage >70%"
    - "Manual /gc trigger"

# ============================================================
# CONTEXT BUDGET TARGETS
# ============================================================
context_targets:
  manifest: "< 500 tokens"
  claude_md: "< 2000 tokens"
  skill_l1: "< 600 tokens"
  skill_l2: "< 4000 tokens"
  skill_l3: "< 3000 tokens"
  skill_l4: "< 2000 tokens"
  total_baseline: "< 3000 tokens (manifest + claude.md + 1 skill L1)"

# ============================================================
# ANTIGRAVITY INTEGRATION
# ============================================================
antigravity_integration:
  session_state_sync:
    path: ".claude/SESSION_STATE.json"
    auto_update: true
    sync_frequency: "on_phase_transition"

  visual_tracking:
    enabled: true
    axes_display: "3D"
    progress_indicators:
      x_axis: "Mind-Spirit Balance"
      y_axis: "Safety-Status Foundation"
      z_axis: "Identity-Action Drive"

  manager_view:
    skill_graph: "enabled"
    dependency_visualization: "enabled"
    context_monitor: "real-time"
    gc_alerts: "enabled_at_70_percent"

  state_persistence:
    ssot_objects: ["PROJECT_BRIEF", "MESSAGE_SPINE", "EVIDENCE_PACK", "VOICE_GUIDE"]
    runtime_state: "SESSION_STATE.json"
    checksum_validation: "enabled"
    drift_detection: "continuous"

