---
# VOICE_GUIDE_v2.1.yaml (Template)
schema: VOICE_GUIDE_v2.1
version: "2.1"

meta:
  brand: ""
  owner: ""
  created_date: "YYYY-MM-DD"
  updated_date: "YYYY-MM-DD"

# Tone Dials (1-10 scale)
tone_dials:
  warmth: 7        # 1=Clinical, 10=Best friend
  authority: 7     # 1=Peer, 10=Expert guru
  urgency: 5       # 1=Relaxed, 10=Time-sensitive
  playfulness: 4   # 1=Serious, 10=Playful
  empathy: 8       # 1=Logical only, 10=Deeply emotional
  complexity: 5    # 1=Simple, 10=Technical
  boldness: 6      # 1=Conservative, 10=Provocative

# Language Patterns
language_patterns:
  sentence_length: "varied"  # short | medium | long | varied
  paragraph_length: "2-4 lines max"
  contractions: "always"  # always | usually | sometimes | never
  questions: "frequent"   # frequent | occasional | rare
  pov: "second_person"    # first | second | third | mixed

# Required Patterns (always do)
required_patterns:
  - "Kitchen table language"
  - "Short paragraphs (max 3-4 lines)"
  - "Varied sentence rhythm"
  - "Concrete sensory examples"
  - "One idea per paragraph"

# Forbidden Words
forbidden_words:
  - "unlock"
  - "revolutionary"
  - "leverage"
  - "synergy"
  - "game-changer"
  - "cutting-edge"

# Forbidden Phrases (AI-isms)
forbidden_phrases:
  - "In today's fast-paced world"
  - "It's important to note that"
  - "Embark on a transformative journey"
  - "Let's dive in"
  - "Without further ado"

# Taboo Moves (never do)
taboo_moves:
  - "fake scarcity"
  - "shame-based pressure"
  - "medical cure claims"
  - "income guarantees"
  - "condescending tone"

# Style Rules
style_rules:
  formatting:
    bold_max_per_section: 2
    use_em_dash: true
    ellipses_allowed: true
    subhead_frequency: "every 3-5 paragraphs"
  
  rhythm:
    vary_sentence_length: true
    short_punchy_after_long: true
    fragment_sentences_allowed: true

# Signature Phrases (brand-specific)
signature_phrases:
  transitions:
    - "Here's the thing..."
    - "But here's what's crazy..."
    - "Let me explain..."
  openings:
    - ""
  closings:
    - ""

# Examples
examples:
  do:
    - "Here's the thing…"
    - "Let's make this simple."
    - "You've tried everything. Nothing worked. I get it."
  dont:
    - "Embark on a transformative journey"
    - "Cutting-edge ecosystem synergies"
    - "It's important to note that in today's landscape..."

# Neuro-Voice Alignment (how voice activates each dimension)
neuro_voice_alignment:
  body_safe:
    tone: "Reassuring, grounded, certain"
    example: "You're completely protected. Zero risk."
  heart_special:
    tone: "Warm, personal, intimate"
    example: "I know exactly what you're going through."
  mind_smart:
    tone: "Clear, logical, precise"
    example: "Here's exactly how it works, step by step."
  spirit_significant:
    tone: "Inspiring, social, meaningful"
    example: "Thousands of people just like you have already..."
  psyche_supported:
    tone: "Direct, confident, action-oriented"
    example: "Click below. It takes 30 seconds."
  conscience_superior:
    tone: "Inclusive, caring, community"
    example: "Welcome to the family. You're one of us now."

# MMA Validation Targets
mma_validation:
  voice_consistency_target: 9.0
  kitchen_table_test: true
  ai_detox_pass: true

---
