# ULTRAMIND SSOT SCAFFOLD PACKAGE v2.1
# Complete Templates for Core SSOT Objects
# 
# Updated: 2026-01-07
# Aligned with: ULTRAMIND Constitution v2.1, 7S/7F Chain, Neuro-Box 6D
#
# CONTENTS:
# 1. PROJECT_BRIEF_v2.1 (YAML + XML)
# 2. MESSAGE_SPINE_v2.1 (YAML + XML)  
# 3. EVIDENCE_PACK_v1.1 (YAML + XML)
# 4. VOICE_GUIDE_v2.1 (YAML + XML)

---

# ═══════════════════════════════════════════════════════════════════
# 1. PROJECT_BRIEF v2.1
# Purpose: Strategic context, constraints, goals, timeline
# Required for: Most tasks
# ═══════════════════════════════════════════════════════════════════

# --- YAML FORMAT ---

PROJECT_BRIEF:
  schema_version: "2.1"
  created_date: "YYYY-MM-DD"
  last_updated: "YYYY-MM-DD"
  project_id: "project_[name]_[date]"
  
  # === CORE IDENTITY ===
  project_name: "[Human-readable project name]"
  codename: "[Internal codename if different]"
  
  # === GOAL & OUTCOME ===
  goal:
    primary: "[Single primary goal - what success looks like]"
    secondary: "[Optional secondary goals]"
    metrics:
      - metric: "[KPI 1]"
        target: "[Target value]"
      - metric: "[KPI 2]"
        target: "[Target value]"
  
  # === AVATAR ===
  avatar:
    name: "[Avatar name - e.g., 'Struggling Sarah']"
    demographics:
      age_range: "[e.g., 40-55]"
      gender: "[if relevant]"
      location: "[geographic relevance]"
      income: "[if relevant]"
    psychographics:
      identity: "[Who they see themselves as]"
      values: "[What they value most]"
      fears: "[What keeps them up at night]"
      desires: "[What they secretly want]"
    pain_points:
      - "[Pain point 1 - in their language]"
      - "[Pain point 2 - in their language]"
      - "[Pain point 3 - in their language]"
    awareness_level: "[unaware | problem_aware | solution_aware | product_aware | most_aware]"
    sophistication: "[novice | medium | expert]"
    traffic_temperature: "[cold | warm | hot]"
  
  # === OFFER ===
  offer:
    name: "[Offer name]"
    type: "[lead_magnet | tripwire | core | premium | continuity]"
    price: "[Price point]"
    delivery: "[How delivered - digital, physical, hybrid]"
    transformation:
      before: "[State before]"
      after: "[State after]"
      timeframe: "[Expected timeframe for results]"
  
  # === CONSTRAINTS ===
  constraints:
    timeline: "[Deadline or timeframe]"
    budget: "[If relevant]"
    platforms: 
      - "[Platform 1 - e.g., Facebook/Instagram]"
      - "[Platform 2]"
    compliance:
      - "[Compliance requirement 1 - e.g., no income claims]"
      - "[Compliance requirement 2]"
    brand_guidelines: "[Reference to brand guide if exists]"
    legal_review_required: true | false
  
  # === CTA ===
  cta:
    primary_action: "[What you want them to do]"
    destination: "[URL or next step]"
    urgency_type: "[none | real_deadline | consequence_based]"
    urgency_detail: "[If real deadline, what is it]"
  
  # === 7S FOCUS (Which dimensions are primary for this project?) ===
  seven_s_focus:
    primary: "[e.g., SAFE, SMART]"
    secondary: "[e.g., SPECIAL, SIGNIFICANT]"
    notes: "[Why these dimensions matter most for this project]"
  
  # === ASSETS NEEDED ===
  assets:
    - asset_type: "[advertorial | sales_page | vsl | email_sequence | lead_magnet]"
      priority: "[P1 | P2 | P3]"
      status: "[not_started | in_progress | complete]"
  
  # === RELATED SSOT ===
  related_ssot:
    message_spine: "[filename or 'to_create']"
    evidence_pack: "[filename or 'to_create']"
    voice_guide: "[filename or 'to_create']"

---

# --- XML FORMAT ---
# <?xml version="1.0" encoding="UTF-8"?>
# <PROJECT_BRIEF schema_version="2.1">
